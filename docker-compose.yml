version: "3.8"

services:
  mlflow:
    build: .
    container_name: mlflow-server
    ports:
      - "5050:5050"
    volumes:
      - ./mlruns:/mlflow
      - ./data:/app/data

  trainer:
    build: .
    container_name: mlflow-trainer
    depends_on:
      - mlflow
    volumes:
      - ./data:/app/data
      - ./mlruns:/mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5050
    command: python train.py