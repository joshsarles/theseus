# Zarf package — THE REFEREE (PKG slot, Day 1-2)
# Build : zarf package create zarf/ -o zarf/dist --confirm        (from repo root)
# Deploy: zarf init --confirm && zarf package deploy zarf/dist/zarf-package-referee-*.tar.zst --confirm
#
# Demo story: "this packages and deploys airgapped." The reference spine (stdlib-only
# Python) rides as ConfigMaps over a digest-pinned python base image; on deploy a Job
# runs the spec §12 smoke in-cluster (33 leaves, verify PASS) and the package waits on it.
# SBOM is generated by zarf automatically (zarf package inspect sbom).
#
# Event-day seam (NOT in this repo, per §10 IP boundary): referee-api / referee-ingest /
# scorer-worker images with retained-IP wheels replace the ConfigMap+base-image shape;
# charts + PVC land here when those images exist. Never commit retained IP.
kind: ZarfPackageConfig
metadata:
  name: referee
  description: "Independent AI assurance & accountability — observe, gate, record, verify. Advisory-only."
  version: 0.1.0
components:
  - name: referee-core
    required: true
    description: "Reference spine smoke, in-cluster: intake (JSONL) -> policy gate -> hash-chain record -> proof bundle -> offline verify. Source + fixtures as ConfigMaps; single digest-pinned python base image."
    images:
      # Platform-specific digest (linux/arm64) keeps the airgap package small — the
      # multi-arch index digest (sha256:a39549e211a16149edf74e5fdc9ef03a6767e46cd987c5048b6659b6c9904c94)
      # drags all 8 platforms in (~332M vs ~45M). Rebuilding for an amd64 event laptop:
      # swap to linux/amd64 digest sha256:c2d8472b831337ab296a8ce652e1ba786e9e3034fc445dc58b50a7f5251f0003
      # in BOTH this file and manifests/job.yaml, then `zarf package create zarf/ -a amd64 ...`.
      - python:3.12-slim@sha256:9bde4953fa9a7abb6db6669bb1b3f10aac83cf38d69a7bfc4941313ccd4c9686
    manifests:
      - name: referee-smoke
        namespace: referee
        kustomizations:
          - kustomize
        kustomizeAllowAnyDirectory: true   # configMapGenerator pulls ../referee, ../cot, ../fixtures
    actions:
      onDeploy:
        after:
          - description: "Wait for the in-cluster smoke to complete (33 leaves, BREACH=4 WARN=4, verify PASS)"
            maxTotalSeconds: 600
            wait:
              cluster:
                kind: job
                name: referee-smoke
                namespace: referee
                condition: complete
          - description: "Show the smoke output"
            cmd: ./zarf tools kubectl -n referee logs job/referee-smoke --tail=50

  - name: fixtures-seed
    required: false
    description: "Synthetic demo fixtures + policy (UNCLASSIFIED) copied to the deploy host for inspection / re-seeding."
    files:
      - source: ../fixtures/policy_cannonico.json
        target: referee-fixtures/policy_cannonico.json
      - source: ../fixtures/smoke_25.jsonl
        target: referee-fixtures/smoke_25.jsonl
      - source: ../fixtures/EXPECTED.md
        target: referee-fixtures/EXPECTED.md

  - name: lula-evidence
    required: false
    description: "Compliance-as-code: OSCAL component definition (NIST 800-53 rev5 mapping; AU-9 + CM-3 live Lula validations) travels WITH the mission package. lula validate -f referee-compliance/component-definition.yaml --confirm-execution"
    files:
      - source: ../lula/component-definition.yaml
        target: referee-compliance/component-definition.yaml
      - source: ../lula/validations/au-9-proof-bundle.yaml
        target: referee-compliance/validations/au-9-proof-bundle.yaml
      - source: ../lula/validations/cm-3-policy-versioned.yaml
        target: referee-compliance/validations/cm-3-policy-versioned.yaml
