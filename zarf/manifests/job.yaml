# The deploy proof: run the spec §12 smoke INSIDE the cluster from the airgapped package.
# Source + fixtures arrive as ConfigMaps (see ../kustomize/kustomization.yaml); the only
# image is the digest-pinned python base. Job green == intake -> gate -> chain -> bundle ->
# offline verify PASS, in-cluster.
apiVersion: batch/v1
kind: Job
metadata:
  name: referee-smoke
  namespace: referee
  labels:
    app.kubernetes.io/name: referee-smoke
    app.kubernetes.io/part-of: referee
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: referee-smoke
        app.kubernetes.io/part-of: referee
    spec:
      restartPolicy: Never
      securityContext:                # AC-6: non-root, no escalation, RO mounts
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: smoke
          # linux/arm64 digest — keep in sync with zarf.yaml images (see comment there)
          image: python:3.12-slim@sha256:9bde4953fa9a7abb6db6669bb1b3f10aac83cf38d69a7bfc4941313ccd4c9686
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              mkdir -p /work/referee /work/cot /work/fixtures /work/out
              cp /src/referee/*.py /work/referee/
              cp /src/cot/*.py /work/cot/
              cp /src/fixtures/* /work/fixtures/
              cd /work
              python -m referee.demo --smoke
              python -m referee.demo --verify
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: TMPDIR
              value: /work
            - name: HOME
              value: /work
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
          volumeMounts:
            - name: work
              mountPath: /work
            - name: referee-src
              mountPath: /src/referee
              readOnly: true
            - name: cot-src
              mountPath: /src/cot
              readOnly: true
            - name: referee-fixtures
              mountPath: /src/fixtures
              readOnly: true
      volumes:
        - name: work
          emptyDir:
            sizeLimit: 64Mi
        - name: referee-src
          configMap:
            name: referee-src
        - name: cot-src
          configMap:
            name: cot-src
        - name: referee-fixtures
          configMap:
            name: referee-fixtures
