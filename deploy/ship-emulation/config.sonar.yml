# USS Theseus (DDG-118) — SONAR subsystem node (SQQ-89 suite: hull/towed array,
# acoustic returns, bearing/range, water-column state).
stream:
  topic: "sensors"
  batch_size: 25
  history_size: 100
mlflow:
  host: "host.docker.internal"   # Mac host running MLflow :5050
  port: 5050
  model: "sonar_deploy"
  version: latest
  experiment: "sonar_anomaly_train"
