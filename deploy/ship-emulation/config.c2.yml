# USS Theseus (DDG-118) — C2 subsystem node (combat system / track management,
# Aegis-style contact picture, weapon/sensor tasking telemetry).
stream:
  topic: "sensors"
  batch_size: 25
  history_size: 100
mlflow:
  host: "host.docker.internal"   # Mac host running MLflow :5050
  port: 5050
  model: "c2_deploy"
  version: latest
  experiment: "c2_anomaly_train"
