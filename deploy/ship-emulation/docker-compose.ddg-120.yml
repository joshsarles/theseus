# AUTO-GENERATED by gen_hull.py — sister hull of USS Theseus (DDG-118).
# Hull DDG-120: subsystem ports offset by +20 (54561-54566). Same models/configs/features as the flagship.
# THESEUS — emulate USS Theseus (DDG-118) as a DESTROYER whose SUBSYSTEMS each
# run in their own container. One node per subsystem; every node reuses the SAME
# `analytics:latest` FastAPI receiver image, but mounts its OWN config.yml that
# points at that subsystem's registered model (<key>_deploy) in the Mac-host
# MLflow registry on :5050 via host.docker.internal.
# =============================================================================
# Same 4-condition recipe proven on the Pi fleet (see deploy/pi-emulation/):
#   • RECEIVER_CONFIG=/cfg/config.yml          (per-node mounted config)
#   • MLFLOW_TRACKING_URI=http://host.docker.internal:5050  (proxied artifacts)
#   • extra_hosts host.docker.internal:host-gateway        (reach the Mac host)
#   • analytics:latest                          (the byte-identical receiver)
#
#   bash deploy/ship-emulation/up.sh         # bring the whole ship up + verify
#   docker compose -f deploy/ship-emulation/docker-compose.yml up -d
#   docker compose -f deploy/ship-emulation/docker-compose.yml logs -f
#   bash deploy/ship-emulation/down.sh
#
# The 6 subsystem nodes share a 'ship' bridge network and each expose a distinct
# host port:
#   machinery 54541 · propulsion 54542 · auxiliary 54543
#   sonar     54544 · c2         54545 · nav        54546
# =============================================================================
name: theseus-ddg-120

# ---- DRY anchor: every subsystem node is identical except config + ports ----
x-subsystem: &subsystem
  image: analytics:latest
  platform: linux/arm64            # native on Apple silicon; matches Pi/receiver arch
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"   # reach the Mac host (MLflow :5050)
  networks: [ship]
  environment: &subsystem-env
    RECEIVER_CONFIG: /cfg/config.yml
    FEATURE_FILE: /cfg/features.json          # per-subsystem feature set (this model's channels)
    MLFLOW_TRACKING_URI: "http://host.docker.internal:5050"
  # Subsystem-controller realism (embedded LRU). Uncomment to constrain:
  # mem_limit: 2g
  # cpus: 2

services:
  machinery-node:
    <<: *subsystem
    container_name: theseus-ddg-120-machinery
    hostname: machinery-node
    ports:
      - "54561:54321"             # host 127.0.0.1:54541 -> MACHINERY (HM&E plant)
    environment:
      <<: *subsystem-env
      NODE_ID: machinery-node
    volumes:
      - ./config.machinery.yml:/cfg/config.yml:ro
      - ./features.machinery.json:/cfg/features.json:ro

  propulsion-node:
    <<: *subsystem
    container_name: theseus-ddg-120-propulsion
    hostname: propulsion-node
    ports:
      - "54562:54321"             # host 127.0.0.1:54542 -> PROPULSION (LM2500 / shafts)
    environment:
      <<: *subsystem-env
      NODE_ID: propulsion-node
    volumes:
      - ./config.propulsion.yml:/cfg/config.yml:ro
      - ./features.propulsion.json:/cfg/features.json:ro

  auxiliary-node:
    <<: *subsystem
    container_name: theseus-ddg-120-auxiliary
    hostname: auxiliary-node
    ports:
      - "54563:54321"             # host 127.0.0.1:54543 -> AUXILIARY (power / cooling / fuel)
    environment:
      <<: *subsystem-env
      NODE_ID: auxiliary-node
    volumes:
      - ./config.auxiliary.yml:/cfg/config.yml:ro
      - ./features.auxiliary.json:/cfg/features.json:ro

  sonar-node:
    <<: *subsystem
    container_name: theseus-ddg-120-sonar
    hostname: sonar-node
    ports:
      - "54564:54321"             # host 127.0.0.1:54544 -> SONAR (SQQ-89 / acoustics)
    environment:
      <<: *subsystem-env
      NODE_ID: sonar-node
    volumes:
      - ./config.sonar.yml:/cfg/config.yml:ro
      - ./features.sonar.json:/cfg/features.json:ro

  c2-node:
    <<: *subsystem
    container_name: theseus-ddg-120-c2
    hostname: c2-node
    ports:
      - "54565:54321"             # host 127.0.0.1:54545 -> C2 (combat system / track mgmt)
    environment:
      <<: *subsystem-env
      NODE_ID: c2-node
    volumes:
      - ./config.c2.yml:/cfg/config.yml:ro
      - ./features.c2.json:/cfg/features.json:ro

  nav-node:
    <<: *subsystem
    container_name: theseus-ddg-120-nav
    hostname: nav-node
    ports:
      - "54566:54321"             # host 127.0.0.1:54546 -> NAV (INS / GPS / steering)
    environment:
      <<: *subsystem-env
      NODE_ID: nav-node
    volumes:
      - ./config.nav.yml:/cfg/config.yml:ro
      - ./features.nav.json:/cfg/features.json:ro

networks:
  ship:
    driver: bridge
