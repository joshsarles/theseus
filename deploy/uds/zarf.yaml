# Zarf package — THESEUS model-delivery loop (NEW parallel deploy tree; does NOT touch zarf/)
# Build : zarf package create deploy/uds/ -o deploy/uds/dist --confirm        (from repo root)
# Deploy: zarf init --confirm && zarf package deploy deploy/uds/dist/zarf-package-theseus-*.tar.zst --confirm
#
# Demo story: "this packages and deploys the edge model-delivery loop airgapped." The stdlib-graceful
# Python loop (stage -> retrain -> update) + the referee hash-chain primitive ride as ConfigMaps over a
# single digest-pinned python base image — the SAME proven shape as the referee package, so one base
# image is pinned/patched/SBOM'd across both. On deploy, an in-cluster Job runs the loop against the
# REAL UCI #316 staged data (carried gzipped), prints the sealed tamper-evident record, and runs an
# offline verify -> PASS. The package waits on the Job and shows its logs.
#
# This is what runs on a Raspberry Pi edge node: pull the staged/registered model, swap it in, prove
# the swap — no shore round-trip. SBOM is generated by zarf automatically (zarf package inspect sbom).
#
# RAILS: human-in-command (decision-support, NOT autonomous ship control) · SWAN-side/unclassified
# (real public CC-BY data) · integrate-not-replace · tamper-EVIDENT not tamper-proof · deployable
# (ATO is the gate), not fielded.
kind: ZarfPackageConfig
metadata:
  name: theseus
  description: "THESEUS — Navy shipboard onboard-analytics + edge model-delivery. Airgap stage->retrain->update with a tamper-evident record. Decision-support, advisory-only."
  version: 0.1.0
components:
  - name: theseus-loop
    required: true
    description: "Edge model-delivery loop in-cluster: stage (real UCI #316) -> retrain (CBM regressor) -> promote to current (rollback kept) -> sealed hash-chain record -> offline verify PASS. Source + gzipped data as ConfigMaps; single digest-pinned python base image (shared with referee)."
    images:
      # Platform-specific digest (linux/arm64 — the Pi cluster target) keeps the airgap package small.
      # Same digest the referee package pins. Rebuilding for an amd64 event laptop: swap to the
      # linux/amd64 digest sha256:c2d8472b831337ab296a8ce652e1ba786e9e3034fc445dc58b50a7f5251f0003
      # in BOTH this file and manifests/theseus-job.yaml, then `zarf package create deploy/uds/ -a amd64 ...`.
      - python:3.12-slim@sha256:9bde4953fa9a7abb6db6669bb1b3f10aac83cf38d69a7bfc4941313ccd4c9686
    manifests:
      - name: theseus-loop
        namespace: theseus
        kustomizations:
          - kustomize
        kustomizeAllowAnyDirectory: true   # configMapGenerator pulls ../../demo, ../../referee, ./staged.csv.gz
    actions:
      onCreate:
        before:
          - description: "Refresh the gzipped real staged data the loop consumes offline (UCI #316, ~540KB gz)"
            cmd: |
              test -f deploy/uds/staged.csv.gz || gzip -9 -c demo/data/staged.csv > deploy/uds/staged.csv.gz
              echo "staged.csv.gz: $(wc -c < deploy/uds/staged.csv.gz) bytes"
      onDeploy:
        after:
          - description: "Wait for the in-cluster model-delivery loop to complete (3 sealed leaves + offline verify PASS)"
            maxTotalSeconds: 600
            wait:
              cluster:
                kind: job
                name: theseus-loop
                namespace: theseus
                condition: complete
          - description: "Show the loop output (sealed record + verify PASS)"
            cmd: ./zarf tools kubectl -n theseus logs job/theseus-loop --tail=60

  - name: data-source-note
    required: false
    description: "Provenance for the staged dataset (real UCI #316 naval gas-turbine CBM, CC BY 4.0) copied to the deploy host for inspection."
    files:
      - source: ../../demo/data/SOURCE.md
        target: theseus-data/SOURCE.md

  - name: lula-evidence
    required: false
    description: "Compliance-as-code: the SAME OSCAL component definition + AU-9/CM-3 live Lula validations travel WITH the mission package (ATO-accelerator). lula validate -f theseus-compliance/component-definition.yaml --confirm-execution"
    files:
      - source: ../../lula/component-definition.yaml
        target: theseus-compliance/component-definition.yaml
      - source: ../../lula/validations/au-9-proof-bundle.yaml
        target: theseus-compliance/validations/au-9-proof-bundle.yaml
      - source: ../../lula/validations/cm-3-policy-versioned.yaml
        target: theseus-compliance/validations/cm-3-policy-versioned.yaml
