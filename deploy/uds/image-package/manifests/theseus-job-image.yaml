# THESEUS deploy proof — REAL-IMAGE variant (airgap-imported, no registry pull).
# =============================================================================
# This is the "most-real" job: it runs the hardened theseus-edge:0.1.0 image
# (built from deploy/Containerfile) directly in-cluster. The image BAKES the
# demo/ loop + referee/ tamper-evident record + the REAL UCI #316 staged.csv,
# so there is NO ConfigMap source-injection and NO registry pull at deploy time
# (the image is side-loaded with `k3d image import` — true airgap shape).
#
# It runs the full model-delivery loop, then a SEPARATE offline verify, in one
# pod:  STEP 1 stage (cached real UCI #316, 11934 rows) -> STEP 2 retrain
# (sklearn GradientBoosting, RMSE ~0.0038) -> STEP 3 promote to models/current
# (rollback kept) -> print the sealed SHA-256 hash-chain record -> offline
# verify PASS (third-party-runnable; no trust in us). Job complete == proof.
#
# RAILS honored (cluster-enforced by the Pepr policy in ../pepr/):
#   - human-in-command: decision-support model delivery, NOT autonomous control.
#   - SWAN-side / unclassified: real public CC-BY data (UCI #316).
#   - tamper-EVIDENT not tamper-proof: printed record is a SHA-256 hash chain,
#     offline-verifiable; the record dir is the workload's own emptyDir.
#   - deployable; ATO is the gate: this proves airgap-deployability, not fielding.
#
# Image: theseus-edge:0.1.0 (digest-pin in airgap; see deploy/Containerfile header).
# imagePullPolicy: Never  -> hard guarantee the side-loaded image is used, never
# pulled. This is what fails LOUDLY if the image was not `k3d image import`ed.
apiVersion: batch/v1
kind: Job
metadata:
  name: theseus-loop
  namespace: theseus
  labels:
    app.kubernetes.io/name: theseus-loop
    app.kubernetes.io/part-of: theseus            # subjects this pod to the Pepr rails
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: theseus-loop
        app.kubernetes.io/part-of: theseus
    spec:
      restartPolicy: Never
      securityContext:                # AC-6: non-root, no escalation (matches Containerfile USER 65534)
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534                # so the emptyDir at /work is writable by uid 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: loop
          image: theseus-edge:0.1.0
          imagePullPolicy: Never      # airgap: use the k3d-imported image, never pull
          command: ["/bin/sh", "-ec"]
          args:
            - |
              echo "================ THESEUS model-delivery loop (in-cluster, baked image) ================"
              # Full loop: stage (real UCI #316) -> retrain (sklearn) -> promote, sealing each step.
              theseus loop
              echo
              echo "----- sealed record: out/record/bundle.json -----"
              cat /work/demo/out/record/bundle.json
              echo
              echo "----- record leaves (idx kind:obs_id) -----"
              cd /work/demo && PYTHONPATH=/work/demo:/work python3 - <<'PY'
              import json, pathlib
              for line in pathlib.Path("out/record/chain.jsonl").read_text().splitlines():
                  if line.strip():
                      r = json.loads(line)
                      print(f"  [{r['idx']}] {r['kind']}:{r['obs_id']}")
              PY
              echo
              echo "----- offline verify (third-party-runnable, no trust in us) -----"
              # Separate offline verify of the SHA-256 hash chain. Non-zero exit fails the Job.
              theseus verify
              echo "======================================================================================="
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            # Airgap: no MLFLOW_TRACKING_URI -> retrain.py skips the optional MLflow log.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi           # sklearn GradientBoosting on 11934 rows headroom
          volumeMounts:
            - name: work
              mountPath: /work         # writable scratch (image copies baked src here, then runs)
      volumes:
        - name: work
          emptyDir:
            sizeLimit: 256Mi
