apiVersion: v1
kind: Pod
metadata:
  name: good-approved
  namespace: theseus
  labels:
    app.kubernetes.io/part-of: theseus
    theseus.forceos.ai/action: model-promote
  annotations:
    theseus.forceos.ai/human-approved-by: "sailor-id:J.Sarles/ticket-THESEUS-42"
    theseus.forceos.ai/approval-record-ref: "out/record/chain.jsonl#leaf2"
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile: { type: RuntimeDefault }
  containers:
    - name: promoter
      image: theseus-edge:0.1.0
      command: ["sleep","30"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities: { drop: ["ALL"] }
      volumeMounts:
        - name: work
          mountPath: /work
  volumes:
    - name: work
      emptyDir: {}
