apiVersion: v1
kind: Pod
metadata:
  name: good-compliant
  namespace: theseus
  labels:
    app.kubernetes.io/part-of: theseus
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile: { type: RuntimeDefault }
  containers:
    - name: ok
      image: theseus-edge:0.1.0
      command: ["sleep","30"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities: { drop: ["ALL"] }
      volumeMounts:
        - name: work
          mountPath: /work
  volumes:
    - name: work
      emptyDir: {}
